name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------- Windows
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust (x86_64-pc-windows-msvc)
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc
      - name: Build
        run: cargo build --release --target x86_64-pc-windows-msvc
      - name: Rename artifact
        run: mv target/x86_64-pc-windows-msvc/release/my-tray-app.exe my-tray-app-windows-x86_64.exe
        shell: bash
      - name: SHA256
        run: sha256sum my-tray-app-windows-x86_64.exe > my-tray-app-windows-x86_64.exe.sha256
        shell: bash
      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            my-tray-app-windows-x86_64.exe
            my-tray-app-windows-x86_64.exe.sha256

  # ----------------------------------------------------------------- macOS
  # macOS runners are now ARM-only, so we cross-compile BOTH targets on a
  # single macos-latest (aarch64) job using the universal macOS SDK.
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust (universal macOS targets)
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          targets: x86_64-apple-darwin,aarch64-apple-darwin
      - name: Build
        run: |
          cargo build --release --target x86_64-apple-darwin
          cargo build --release --target aarch64-apple-darwin
        shell: bash
      - name: Rename + SHA256
        run: |
          mv target/x86_64-apple-darwin/release/my-tray-app my-tray-app-macos-x86_64
          mv target/aarch64-apple-darwin/release/my-tray-app my-tray-app-macos-aarch64
          shasum -a 256 my-tray-app-macos-x86_64 > my-tray-app-macos-x86_64.sha256
          shasum -a 256 my-tray-app-macos-aarch64 > my-tray-app-macos-aarch64.sha256
        shell: bash
      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            my-tray-app-macos-x86_64
            my-tray-app-macos-x86_64.sha256
            my-tray-app-macos-aarch64
            my-tray-app-macos-aarch64.sha256

  # ----------------------------------------------------------------- Linux
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install GTK + WebKit dev libraries
        run: |
          sudo apt-get update
          # libgtk-3-dev      : tray-icon's GTK3 backend
          # libappindicator3-dev: required by tray-icon's `gtk` feature on Linux
          # libwebkit2gtk-4.1-dev: kept for when a WebView is added later
          # libgtk-3-dev      : tray-icon's GTK3 backend
          # libappindicator3-dev: required by tray-icon's `gtk` feature on Linux
          # libxdo-dev        : linked by the `muda` menu crate (copy/paste items)
          # libwebkit2gtk-4.1-dev: kept for when a WebView is added later
          sudo apt-get install -y libgtk-3-dev libappindicator3-dev libxdo-dev libwebkit2gtk-4.1-dev
      - name: Set up Rust (x86_64-unknown-linux-gnu)
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          targets: x86_64-unknown-linux-gnu
      - name: Build
        run: cargo build --release --target x86_64-unknown-linux-gnu
      - name: Rename artifact
        run: mv target/x86_64-unknown-linux-gnu/release/my-tray-app my-tray-app-linux-x86_64
        shell: bash
      - name: SHA256
        run: sha256sum my-tray-app-linux-x86_64 > my-tray-app-linux-x86_64.sha256
        shell: bash
      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            my-tray-app-linux-x86_64
            my-tray-app-linux-x86_64.sha256
